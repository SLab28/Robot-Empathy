<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HIDDEN — VR Experience</title>
  <link rel="stylesheet" href="css/main.css">

  <!-- Three.js r160 via CDN (importmap MUST precede any type="module" script) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- Phase 0: Loading overlay (before any AR) -->
  <div id="loading-overlay" class="loading-overlay">
    <p id="loading-text">Loading HIDDEN…</p>
    <p class="loading-sub">Please allow camera access when prompted</p>
  </div>

  <!-- Phase 1+2: AR overlay (prompt + WebXR DOM overlay) -->
  <div id="ar-overlay" class="ar-overlay hidden">
    <div class="ar-overlay-content">
      <p id="ar-status" class="ar-status"></p>
      <button id="ar-start-btn" class="ar-start-btn hidden">Tap to enter VR</button>
    </div>
  </div>

  <button id="mode-toggle-btn" class="mode-toggle-btn" type="button"></button>

  <!-- Voice Agent: Persona Selector (shown before XR session) -->
  <div id="persona-overlay" class="persona-overlay hidden">
    <div class="persona-title">GREYMETA</div>
    <div class="persona-subtitle">Select interaction mode</div>
    <div class="persona-grid" id="persona-grid"></div>
    <button id="persona-confirm" class="persona-confirm" disabled>Enter Experience →</button>
  </div>

  <!-- Voice Agent: Session Controls (shown during XR) -->
  <div id="voice-hud" class="voice-hud hidden">
    <div id="eeg-readout" class="eeg-readout"></div>
    <div class="voice-hud-row">
      <button id="voice-btn" class="voice-btn" type="button">🎙 Start Session</button>
      <span id="voice-status" class="voice-status">idle</span>
    </div>
    <div class="voice-hud-row voice-sim-row">
      <button class="sim-btn" onclick="window._injectSim?.('calm')">🧘 calm</button>
      <button class="sim-btn" onclick="window._injectSim?.('anxious')">⚡ anxious</button>
      <button class="sim-btn" onclick="window._injectSim?.('engaged')">🚀 engaged</button>
    </div>
  </div>

  <!-- Fallback for unsupported devices -->
  <div id="fallback-message" class="fallback-message hidden">
    <p>This device does not support immersive VR.</p>
    <p>Please use a WebXR-compatible browser on your headset or device.</p>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
